<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SARL BATISYSTÈME - إدارة التسبيقات</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary-gold: #c29343;
            --accent-blue: #3b82f6;
            --pdf-red: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --fb-blue: #1877F2;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        .app-shell {
            width: 100%; max-width: 500px; margin: 0 auto;
            padding: 15px; padding-bottom: 100px;
            position: relative;
        }

        .top-watermark {
            text-align: center; width: 100%; font-size: 10px; font-weight: bold;
            color: var(--primary-gold); letter-spacing: 2px; margin-bottom: 10px; opacity: 0.7;
        }

        header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .brand-container { display: flex; flex-direction: column; flex-grow: 1; }
        .brand-name { color: var(--primary-gold); font-size: 22px; font-weight: 900; margin: 0; line-height: 1; }
        
        .project-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .annexe-selector {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--primary-gold);
            color: var(--text-main);
            padding: 5px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            outline: none;
            flex-grow: 1;
        }

        .settings-btn {
            background: none; border: 1px solid var(--text-muted); color: var(--text-muted);
            border-radius: 5px; padding: 4px 8px; cursor: pointer; font-size: 16px;
        }

        .brand-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

        .fb-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--fb-blue);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            text-decoration: none;
            margin-bottom: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            cursor: pointer;
            border: none;
        }
        .fb-link:active { transform: scale(0.9); }
        .fb-icon { font-weight: bold; font-family: sans-serif; font-size: 18px; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card-bg); border-radius: 12px; padding: 10px 5px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-label { color: var(--text-muted); font-size: 10px; display: block; }
        .stat-value { font-size: 14px; font-weight: bold; }

        .data-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; font-size: 13px; }
        .data-table th { background: rgba(255,255,255,0.05); padding: 10px; color: var(--text-muted); text-align: right; }
        .data-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .time-stamp { display: block; font-size: 9px; color: var(--accent-blue); margin-top: 2px; }

        .footer-actions {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #0b1120; padding: 12px;
            display: flex; gap: 8px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }
        .btn { border: none; border-radius: 10px; height: 45px; font-weight: bold; cursor: pointer; flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px; color: white; }
        .btn-save { background: var(--primary-gold); color: #000; }
        .btn-pdf { background: var(--pdf-red); }
        .btn-add { background: var(--accent-blue); width: 50px; flex: none; border-radius: 50%; font-size: 24px; }

        .overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 200; display: none; padding: 20px;
        }
        .search-input { width: 100%; background: var(--card-bg); border: 1px solid var(--accent-blue); padding: 12px; border-radius: 10px; color: white; margin-bottom: 10px; outline: none; }
        
        .add-new-btn {
            width: 100%; background: rgba(59, 130, 246, 0.15); border: 1px dashed var(--accent-blue);
            color: var(--accent-blue); padding: 10px; border-radius: 10px; margin-bottom: 15px; cursor: pointer; font-weight: bold;
        }

        .list-item { 
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; justify-content: space-between; align-items: center;
        }
        .delete-btn { color: var(--pdf-red); font-size: 14px; padding: 5px; cursor: pointer; background: none; border: none; }

        #customModal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 300; display: none; align-items: center; justify-content: center; }
        .modal-content { background: var(--card-bg); padding: 20px; border-radius: 15px; width: 85%; max-width: 320px; }
        #toast { position: fixed; top: -50px; left: 50%; transform: translateX(-50%); background: #10b981; padding: 10px 20px; border-radius: 20px; font-size: 13px; transition: 0.4s; z-index: 400; }
        #toast.show { top: 20px; }
    </style>
</head>
<body>

<div id="toast">تمت العملية بنجاح</div>

<div class="app-shell" id="captureArea">
    <div class="top-watermark">BY OOPSANOO</div>

    <header>
        <div class="brand-container">
            <h1 class="brand-name">SARL BATISYSTÈME</h1>
            <div class="project-row">
                <select id="projectSelect" class="annexe-selector hide-exp" onchange="changeProject()"></select>
                <button class="settings-btn hide-exp" onclick="showProjectSettings()">⚙️</button>
            </div>
            <span id="projectDisplay" style="display:none; color: var(--text-main); font-size: 14px; font-weight: bold; margin-top: 4px;"></span>
            <p class="brand-sub">إدارة التسبيقات الرقمية</p>
        </div>
        
        <div style="text-align: left; display: flex; flex-direction: column; align-items: flex-end;">
            <button onclick="openFacebookApp()" class="fb-link hide-exp" id="fbIcon">
                <span class="fb-icon">f</span>
            </button>
            <span id="liveDate" style="font-size: 11px; color: var(--text-muted);"></span>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><span class="stat-label">العمال</span><span class="stat-value" id="countVal">0</span></div>
        <div class="stat-card" style="border: 1px solid var(--primary-gold);"><span class="stat-label">المجموع</span><span class="stat-value" id="totalVal">0 DA</span></div>
        <div class="stat-card"><span class="stat-label">توقيت التقرير</span><span class="stat-value" id="timeVal">00:00</span></div>
    </div>

    <table class="data-table">
        <thead>
            <tr>
                <th style="width:20px">#</th>
                <th>اسم العامل والتاريخ</th>
                <th>المبلغ</th>
                <th class="hide-exp" style="width:30px"></th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<div class="footer-actions">
    <button class="btn btn-save" onclick="exportImage()">📸 صورة</button>
    <button class="btn btn-add" onclick="showSearch()">+</button>
    <button class="btn btn-pdf" onclick="exportPDF()">📄 PDF</button>
</div>

<div id="searchOverlay" class="overlay">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 id="searchTitle">قائمة عمال</h3>
        <button onclick="hideSearch()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
    </div>
    <input type="text" id="searchInput" class="search-input" placeholder="بحث عن اسم..." onkeyup="filterNames()">
    <button class="add-new-btn" onclick="addNewNamePrompt()">+ إضافة عامل جديد</button>
    <div id="namesList" style="overflow-y: auto; max-height: 60vh;"></div>
</div>

<div id="projectSettingsOverlay" class="overlay">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3>إدارة القوائم (ANNEXES)</h3>
        <button onclick="hideProjectSettings()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
    </div>
    <button class="add-new-btn" onclick="addNewProject()">+ إضافة ANNEXE جديدة</button>
    <div id="projectsManageList" style="overflow-y: auto; max-height: 70vh;"></div>
</div>

<div id="customModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-top:0; color:var(--primary-gold);"></h3>
        <input type="number" id="modalInput" style="width:100%; padding:12px; margin:15px 0; border-radius:8px; border:none; outline:none; font-size:16px;" placeholder="أدخل المبلغ (DA)">
        <div style="display:flex; justify-content:flex-end; gap:10px;">
            <button onclick="closeModal()" style="background:none; color:var(--text-muted); border:none; font-weight:bold; cursor:pointer;">إلغاء</button>
            <button id="modalConfirmBtn" style="background:var(--accent-blue); color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">تأكيد</button>
        </div>
    </div>
</div>

<script>
    let currentProject = "ANNEXE N°08 TRAVERSA";
    let workerData = []; 
    let searchableNames = [];
    let projectsList = ["ANNEXE N°08 TRAVERSA", "ANNEXE N°01", "ANNEXE N°07"];

    const defaultNames = {
        "ANNEXE N°08 TRAVERSA": ["عمران محمد", "منصوري حميد", "ينصالي عبد القادر", "حمراوي امين", "عبيد محمد", "حماد الزبير", "شرماط فؤاد", "قبايلي محمد", "بوزياني محي الدين", "زرميش", "حمراوي علي", "مفتاح حبيب", "مسيد محمد", "بن الدين فضيلة", "خلفي نور الدين", "كداد محمد"]
    };

    function init() {
        const savedProjects = localStorage.getItem('bt_projects_list');
        if(savedProjects) projectsList = JSON.parse(savedProjects);
        
        const lastProject = localStorage.getItem('bt_current_project');
        if(lastProject && projectsList.includes(lastProject)) currentProject = lastProject;
        else currentProject = projectsList[0];

        updateProjectDropdown();
        loadProjectData();
        document.getElementById('liveDate').textContent = new Date().toLocaleDateString('ar-DZ');
    }

    function updateProjectDropdown() {
        const select = document.getElementById('projectSelect');
        select.innerHTML = '';
        projectsList.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p; opt.textContent = p;
            select.appendChild(opt);
        });
        select.value = currentProject;
    }

    function loadProjectData() {
        const d = localStorage.getItem(`bt_data_${currentProject}`);
        workerData = d ? JSON.parse(d) : [];
        const n = localStorage.getItem(`bt_names_${currentProject}`);
        searchableNames = n ? JSON.parse(n) : (defaultNames[currentProject] || []);
        document.getElementById('searchTitle').textContent = `قائمة عمال ${currentProject}`;
        render();
    }

    // إدارة القوائم (ANNEXES)
    function showProjectSettings() {
        document.getElementById('projectSettingsOverlay').style.display = 'block';
        renderProjectsManageList();
    }

    function hideProjectSettings() {
        document.getElementById('projectSettingsOverlay').style.display = 'none';
    }

    function renderProjectsManageList() {
        const list = document.getElementById('projectsManageList');
        list.innerHTML = '';
        projectsList.forEach((p, index) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = `
                <span>${p}</span>
                <button class="delete-btn" onclick="deleteProject(${index})">🗑️</button>
            `;
            list.appendChild(div);
        });
    }

    function addNewProject() {
        const name = prompt("أدخل اسم القائمة الجديدة (مثلاً ANNEXE N°02):");
        if(name && name.trim() !== "") {
            const cleanName = name.trim();
            if(projectsList.includes(cleanName)) {
                alert("هذا الملحق موجود بالفعل!");
            } else {
                projectsList.push(cleanName);
                saveProjects();
                updateProjectDropdown();
                renderProjectsManageList();
                showToast("تمت إضافة الملحق بنجاح");
            }
        }
    }

    function deleteProject(index) {
        if(projectsList.length <= 1) {
            alert("يجب أن تظل قائمة واحدة على الأقل!");
            return;
        }
        const pName = projectsList[index];
        if(confirm(`هل أنت متأكد من حذف ${pName}؟ سيتم حذف جميع بياناتها أيضاً.`)) {
            localStorage.removeItem(`bt_data_${pName}`);
            localStorage.removeItem(`bt_names_${pName}`);
            projectsList.splice(index, 1);
            if(currentProject === pName) currentProject = projectsList[0];
            saveProjects();
            updateProjectDropdown();
            loadProjectData();
            renderProjectsManageList();
            showToast("تم الحذف");
        }
    }

    function saveProjects() {
        localStorage.setItem('bt_projects_list', JSON.stringify(projectsList));
    }

    // بقية وظائف التطبيق...
    function openFacebookApp() {
        const fbPageUrl = "https://www.facebook.com/share/1Dwgwxo2SU/";
        window.location.href = "fb://facewebmodal/f?href=" + fbPageUrl;
        setTimeout(() => { window.open(fbPageUrl, '_blank'); }, 500);
    }

    function showSearch() { document.getElementById('searchOverlay').style.display = 'block'; filterNames(); }
    function hideSearch() { document.getElementById('searchOverlay').style.display = 'none'; }

    function filterNames() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const list = document.getElementById('namesList');
        list.innerHTML = '';
        searchableNames.forEach((name, index) => {
            if(name.toLowerCase().includes(q)) {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<span style="flex-grow:1; cursor:pointer;" onclick="requestAmount('${name}')">${name}</span>
                                <button class="delete-btn" onclick="deleteName(${index})">🗑️</button>`;
                list.appendChild(div);
            }
        });
    }

    function addNewNamePrompt() {
        const n = prompt("اسم العامل الجديد:");
        if(n && n.trim() !== "") {
            searchableNames.push(n.trim());
            localStorage.setItem(`bt_names_${currentProject}`, JSON.stringify(searchableNames));
            filterNames();
        }
    }

    function deleteName(index) {
        if(confirm("حذف الاسم؟")) {
            searchableNames.splice(index, 1);
            localStorage.setItem(`bt_names_${currentProject}`, JSON.stringify(searchableNames));
            filterNames();
        }
    }

    function requestAmount(name) {
        if(workerData.some(w => w.name === name)) { alert("موجود مسبقاً!"); return; }
        document.getElementById('modalTitle').textContent = name;
        document.getElementById('customModal').style.display = 'flex';
        document.getElementById('modalConfirmBtn').onclick = () => {
            const amt = document.getElementById('modalInput').value;
            if(amt) {
                const now = new Date();
                workerData.push({ 
                    name, 
                    amount: parseInt(amt), 
                    time: now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0'),
                    date: now.getDate() + "/" + (now.getMonth()+1)
                });
                saveAndRender(); closeModal(); hideSearch();
            }
        };
    }

    function changeProject() {
        currentProject = document.getElementById('projectSelect').value;
        localStorage.setItem('bt_current_project', currentProject);
        loadProjectData();
    }

    function saveAndRender() { localStorage.setItem(`bt_data_${currentProject}`, JSON.stringify(workerData)); render(); }
    function closeModal() { document.getElementById('customModal').style.display = 'none'; }
    function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }

    function render() {
        const tbody = document.getElementById('tableBody'); tbody.innerHTML = ''; let total = 0;
        workerData.forEach((w, i) => {
            total += w.amount;
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${i+1}</td><td><strong>${w.name}</strong><span class="time-stamp">${w.date} | ${w.time}</span></td>
                            <td style="color:var(--primary-gold)">${w.amount.toLocaleString()}</td>
                            <td class="hide-exp"><button onclick="deleteRow(${i})" style="background:none; border:none; color:var(--pdf-red)">✕</button></td>`;
            tbody.appendChild(tr);
        });
        document.getElementById('totalVal').textContent = total.toLocaleString() + " DA";
        document.getElementById('countVal').textContent = workerData.length;
        document.getElementById('timeVal').textContent = new Date().getHours() + ":" + new Date().getMinutes().toString().padStart(2, '0');
    }

    function deleteRow(i) { workerData.splice(i,1); saveAndRender(); }

    async function prepareForExport(exp) {
        const select = document.getElementById('projectSelect');
        const display = document.getElementById('projectDisplay');
        if(exp) {
            display.textContent = select.value; display.style.display = 'block';
            document.querySelectorAll('.hide-exp').forEach(el => el.style.display = 'none');
        } else {
            display.style.display = 'none';
            document.querySelectorAll('.hide-exp').forEach(el => el.style.display = '');
        }
    }

    async function exportImage() {
        await prepareForExport(true);
        const canvas = await html2canvas(document.getElementById('captureArea'), { backgroundColor: '#0f172a', scale: 3 });
        const link = document.createElement('a'); link.download = `${currentProject}.png`; link.href = canvas.toDataURL(); link.click();
        await prepareForExport(false);
    }

    async function exportPDF() {
        const { jsPDF } = window.jspdf; await prepareForExport(true);
        const canvas = await html2canvas(document.getElementById('captureArea'), { backgroundColor: '#0f172a', scale: 3 });
        const pdf = new jsPDF('p', 'mm', 'a4');
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
        pdf.save(`${currentProject}.pdf`); await prepareForExport(false);
    }

    init();
</script>
</body>
</html>
