<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATISYSTÈME - مولد كود التفعيل</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #c29343;
        }
        h2 { color: #c29343; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            background-color: #0f172a;
            border: 1px solid #3b82f6;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
        }
        button {
            width: 100%;
            background-color: #c29343;
            color: black;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        button:active { transform: scale(0.98); }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: rgba(59, 130, 246, 0.1);
            border: 1px dashed #3b82f6;
            border-radius: 8px;
            display: none;
        }
        .result-label { font-size: 13px; color: #94a3b8; }
        .result-code {
            font-size: 22px;
            font-weight: bold;
            color: #3b82f6;
            font-family: monospace;
            margin-top: 5px;
            letter-spacing: 1px;
            user-select: all;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>مولد مفاتيح التفعيل 🔑</h2>
    <p style="font-size: 13px; color: #94a3b8; margin-bottom: 20px;">أدخل الـ Android ID الخاص بجهاز العامل لتوليد كود التفعيل المطابق:</p>
    
    <input type="text" id="androidIdInput" placeholder="أدخل Android ID هنا (مثال: 4A8F9B2C)">
    <button onclick="generateActivationCode()">توليد كود التفعيل</button>

    <div id="resultBox" class="result-box">
        <span class="result-label">كود التفعيل الخاص بهذا الجهاز هو:</span>
        <div id="activationCodeDisplay" class="result-code"></div>
    </div>
</div>

<script>
    // دالة محاكاة جافا لعمل الـ Hash الكلاسيكي للسلاسل النصية (String.hashCode)
    function getHashCode(str) {
        let hash = 0;
        if (str.length === 0) return hash;
        for (let i = 0; i < str.length; i++) {
            const chr = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + chr;
            hash |= 0; // تحويله إلى 32bit Integer
        }
        return hash;
    }

    function generateActivationCode() {
        const androidId = document.getElementById('androidIdInput').value.trim().toUpperCase();
        
        if (!androidId) {
            alert("من فضلك أدخل الـ Android ID أولاً!");
            return;
        }

        // تطبيق نفس الخوارزمية البرمجية الموجودة في الـ APK:
        // 1. حساب الـ Hash code وتحويله لقيمة مطلقة (موجبة)
        const hashAbs = Math.abs(getHashCode(androidId));
        
        // 2. عمل عملية XOR (^) مع الرقم السري السري الخاص بك وهو 7777
        const secretNumber = hashAbs ^ 7777;
        
        // 3. صياغة الكود النهائي المعتمد للتطبيق
        const finalCode = "BAT-" + secretNumber;

        // عرض النتيجة
        document.getElementById('activationCodeDisplay').textContent = finalCode;
        document.getElementById('resultBox').style.display = 'block';
    }
</script>

</body>
</html>
